name: Build and Export IPA

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-13

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.0.app

      - name: Build project (no signing)
        run: |
          xcodebuild -project web/web.xcodeproj \
            -scheme web \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/web.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Create IPA manually
        run: |
          mkdir -p Payload
          cp -r build/web.xcarchive/Products/Applications/web.app Payload/
          zip -r build/web/web.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: web-ipa
          path: build/web/web.ipa